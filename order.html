<!DOCTYPE html>
<html>
<head>
    <title>Order</title>
</head>
<body>
    <h2>Place Order</h2>

    <form method="POST">
        Student ID: <input type="number" name="student_id" required><br><br>

        Item:
        <select name="item_id">
            {% for item in items %}
            <option value="{{ item.item_id }}">{{ item.item_name }}</option>
            {% endfor %}
        </select><br><br>

        Quantity: <input type="number" name="quantity" required><br><br>

        <button type="submit">Order</button>
    </form>

    <a href="/">Back</a>
</body>
</html>
